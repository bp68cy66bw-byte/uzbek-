<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uzbekistan World Cup 2026</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:linear-gradient(to right,#0099ff,#00cc66);
    color:white;
    text-align:center;
    padding:40px;
}

.hero{
    background:url('https://images.unsplash.com/photo-1528127269322-539801943592') center/cover;
    height:400px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    border-radius:10px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>
<h1>🇺🇿 Uzbekistan World Cup 2026</h1>
<p>Proudly supporting Uzbekistan on the world stage</p>
</header>

<div class="hero"></div>

<div class="container">

<div class="card">
<h2>Welcome</h2>
<p>Uzbekistan has reached the FIFA World Cup. Fans across the world are celebrating this historic achievement.</p>
</div>

<div class="card">
<h2>Uzbekistan Gallery</h2>

<div class="gallery">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Registan_Square_Samarkand.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/77/Tashkent_City.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/67/Uzbekistan_flag.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Bukhara_old_city.jpg">
</div>

</div>

</div>

<footer>
© 2026 Uzbekistan World Cup Fan Site
</footer>

</body>
</html>
